<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>WTSA - Novo incidente</title>
    <link rel="icon" href="{{ url_for('static', filename='img/logo3-icon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="menu-title">MENU PRINCIPAL</div>
            <nav class="nav">
                <a href="{{ url_for('dashboard') }}" class="nav-item">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="9"></rect>
                            <rect x="14" y="3" width="7" height="5"></rect>
                            <rect x="14" y="12" width="7" height="9"></rect>
                            <rect x="3" y="16" width="7" height="5"></rect>
                        </svg>
                    </span>
                    <span class="nav-text">Dashboard</span>
                </a>

                <a href="{{ url_for('users') }}" class="nav-item">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="3"></circle>
                            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a3 3 0 0 1 0 5.74"></path>
                        </svg>
                    </span>
                    <span class="nav-text">Usuários</span>
                </a>

                <a href="{{ url_for('resources') }}" class="nav-item">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 7.5L12 3l9 4.5-9 4.5z"></path>
                            <path d="M3 16.5L12 12l9 4.5-9 4.5z"></path>
                            <path d="M12 12v9"></path>
                        </svg>
                    </span>
                    <span class="nav-text">Recursos</span>
                </a>

                <a href="{{ url_for('security') }}" class="nav-item active">
                    <span class="nav-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                    </span>
                    <span class="nav-text">Segurança</span>
                </a>
            </nav>
        </div>

        <div class="sidebar-bottom">
            <a class="logout-btn" href="{{ url_for('login') }}">
                <span class="logout-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </span>
                <span>Sair</span>
            </a>
        </div>
    </aside>

    <main class="main">
        <header class="header">
            <div class="header-left">
                <button id="sidebar-toggle" class="top-toggle-btn" aria-label="Alternar menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="6" height="18" rx="1"></rect>
                        <path d="M14 8l4 4-4 4"></path>
                    </svg>
                </button>

                <div class="logo-mark">
                    <img src="{{ url_for('static', filename='img/logo3.png') }}" alt="Wayne Enterprises Logo">
                </div>

                <div class="header-text">
                    <div class="system-sigla">WTSA</div>
                    <div class="system-name">WAYNETECH SECUREACCESS</div>
                </div>
            </div>
        </header>

        <div class="main-content">
            <section class="page-header">
                <h1 class="page-title">Novo incidente</h1>
                <p class="page-subtitle">Registre manualmente um incidente de segurança relacionado a um recurso</p>
            </section>

            <section class="users-table-card">
                <form method="post" class="edit-form">
                    <div class="form-row">
                        <label>Recurso</label>
                        <select name="recurso_id" required>
                            <option value="">Selecione um recurso</option>
                            {% for r in recursos %}
                            <option value="{{ r.id }}">{{ r.nome }} {% if r.localizacao %}- {{ r.localizacao }}{% endif %}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-row">
                        <label>Tipo de incidente</label>
                        <select name="tipo_movimentacao" required>
                            <option value="cadastrado">Cadastro de recurso</option>
                            <option value="atualizado">Atualização de recurso</option>
                            <option value="desativado">Desativação de recurso</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <label>Detalhes (opcional)</label>
                        <input type="text" name="detalhes" placeholder="Ex.: Incidente registrado manualmente após auditoria">
                    </div>

                    <div class="form-actions">
                        <a href="{{ url_for('security') }}" class="btn ghost">Cancelar</a>
                        <button type="submit" class="btn primary">Registrar incidente</button>
                    </div>
                </form>
            </section>
        </div>

        <footer class="footer">
            <span>©2026 Wayne Enterprises. All rights reserved</span>
        </footer>
    </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const toggleBtn = document.getElementById("sidebar-toggle");
    const app = document.querySelector(".app");
    if (!toggleBtn || !app) return;
    toggleBtn.addEventListener("click", () => {
        app.classList.toggle("sidebar-collapsed");
    });
});
</script>

<style>
.edit-form {
    display: flex;
    flex-direction: column;
    gap: 14px;
}
.form-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 13px;
}
.form-row label {
    color: #d7d7e2;
}
.form-row input,
.form-row select {
    background: #222222;
    border-radius: 8px;
    border: 1px solid #3c3c3c;
    padding: 8px 10px;
    color: #f5f5f5;
    font-family: inherit;
    font-size: 13px;
}
.form-row input:focus,
.form-row select:focus {
    outline: none;
    border-color: #f5f5f5;
}
.form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 10px;
}
</style>
</body>
</html>
